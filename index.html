<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Cloud Tasks - Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .task-item {
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .floating { animation: float 6s ease-in-out infinite; }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #ff6b6b;
            top: -100px;
            left: -100px;
            animation: move1 20s infinite alternate;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #4ecdc4;
            bottom: -50px;
            right: -50px;
            animation: move2 15s infinite alternate;
        }

        @keyframes move1 {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        @keyframes move2 {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(-100px, -50px) scale(1.3); }
        }

        .checkbox-wrapper input:checked + div {
            background: #10b981;
            border-color: #10b981;
        }

        .checkbox-wrapper input:checked + div svg { display: block; }

        .progress-ring { transform: rotate(-90deg); }
        .progress-ring-circle { transition: stroke-dashoffset 0.5s ease; }

        .delete-btn {
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.3s ease;
        }

        .task-item:hover .delete-btn {
            opacity: 1;
            transform: translateX(0);
        }

        .category-pill { transition: all 0.3s ease; }
        .category-pill.active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        input:focus { outline: none; }

        .shake { animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confetti-fall 3s ease-out forwards;
            z-index: 9999;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .online-badge {
            background: rgba(34, 197, 94, 0.8);
        }

        .offline-badge {
            background: rgba(239, 68, 68, 0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body class="text-white relative">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container mx-auto px-4 py-8 max-w-6xl relative z-10">
        
        <!-- AUTH SECTION -->
        <div id="auth-section" class="min-h-screen flex items-center justify-center">
            <div class="glass-card rounded-3xl p-8 w-full max-w-md text-center">
                <div class="mb-6">
                    <div class="w-20 h-20 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full mx-auto flex items-center justify-center mb-4">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold mb-2">Nexus Cloud</h1>
                    <p class="text-white/70">Sync your tasks across all devices</p>
                </div>

                <div class="space-y-4">
                    <input type="email" id="email-input" placeholder="Email address" 
                           class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/50 focus:bg-white/20 transition-all">
                    <input type="password" id="password-input" placeholder="Password (min 6 chars)" 
                           class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/50 focus:bg-white/20 transition-all">
                    
                    <button id="signin-btn" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold py-3 rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg flex items-center justify-center gap-2">
                        <span id="login-text">Sign In / Create Account</span>
                        <div id="login-spinner" class="loading-spinner hidden"></div>
                    </button>
                    
                    <p class="text-sm text-white/50 mt-4">Enter any email/password to create an account automatically</p>
                    <p id="error-message" class="text-red-400 text-sm hidden mt-2"></p>
                </div>
            </div>
        </div>

        <!-- MAIN APP SECTION -->
        <div id="app-section" class="hidden">
            <header class="flex justify-between items-center mb-12 floating">
                <div class="glass rounded-2xl px-8 py-4 flex items-center gap-4">
                    <div>
                        <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-purple-200">Nexus Cloud</h1>
                        <p class="text-purple-200 text-sm mt-1" id="current-date">Loading...</p>
                    </div>
                    <div id="connection-status" class="online-badge px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-2">
                        <span class="w-2 h-2 bg-white rounded-full"></span>
                        <span id="status-text">Synced</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="glass rounded-2xl p-4 flex items-center gap-4">
                        <div class="text-right">
                            <div class="text-2xl font-bold" id="completion-rate">0%</div>
                            <div class="text-xs text-purple-200">Completed</div>
                        </div>
                        <svg class="progress-ring" width="60" height="60">
                            <circle cx="30" cy="30" r="26" stroke="rgba(255,255,255,0.2)" stroke-width="4" fill="none"/>
                            <circle id="progress-circle" class="progress-ring-circle" cx="30" cy="30" r="26" stroke="#10b981" stroke-width="4" fill="none" 
                                    stroke-dasharray="163.36" stroke-dashoffset="163.36" stroke-linecap="round"/>
                        </svg>
                    </div>
                    
                    <button id="signout-btn" class="glass p-4 rounded-2xl hover:bg-white/20 transition-all" title="Sign Out">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-6">
                    <div class="glass-card rounded-3xl p-6">
                        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            New Task
                        </h2>
                        
                        <input type="text" id="task-input" placeholder="What needs to be done?" 
                               class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 mb-4 text-white placeholder-white/50 focus:bg-white/20 transition-all">
                        
                        <div class="flex gap-2 mb-4">
                            <button class="category-pill active px-4 py-2 rounded-full text-sm bg-white/10 border border-white/20 hover:bg-white/20" data-cat="work">Work</button>
                            <button class="category-pill px-4 py-2 rounded-full text-sm bg-white/10 border border-white/20 hover:bg-white/20" data-cat="personal">Personal</button>
                            <button class="category-pill px-4 py-2 rounded-full text-sm bg-white/10 border border-white/20 hover:bg-white/20" data-cat="urgent">Urgent</button>
                        </div>
                        
                        <button id="add-task-btn" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold py-3 rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg">
                            Add Task
                        </button>
                    </div>

                    <div class="glass-card rounded-3xl p-6">
                        <h3 class="text-lg font-semibold mb-4">Overview</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-white/70">Total Tasks</span>
                                <span class="font-bold text-2xl" id="total-count">0</span>
                            </div>
                            <div class="h-px bg-white/20"></div>
                            <div class="flex justify-between items-center">
                                <span class="text-white/70">Pending</span>
                                <span class="font-bold text-2xl text-yellow-400" id="pending-count">0</span>
                            </div>
                            <div class="h-px bg-white/20"></div>
                            <div class="flex justify-between items-center">
                                <span class="text-white/70">Completed</span>
                                <span class="font-bold text-2xl text-green-400" id="completed-count">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="glass-card rounded-3xl p-6 min-h-[600px]">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-semibold">Your Tasks</h2>
                            <div class="flex gap-2">
                                <button class="filter-btn active px-4 py-2 rounded-lg text-sm bg-white/20 hover:bg-white/30 transition-all" data-filter="all">All</button>
                                <button class="filter-btn px-4 py-2 rounded-lg text-sm bg-white/10 hover:bg-white/20 transition-all" data-filter="active">Active</button>
                                <button class="filter-btn px-4 py-2 rounded-lg text-sm bg-white/10 hover:bg-white/20 transition-all" data-filter="completed">Completed</button>
                            </div>
                        </div>

                        <div id="task-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2"></div>

                        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
                            <div class="w-24 h-24 bg-white/10 rounded-full flex items-center justify-center mb-4">
                                <svg class="w-12 h-12 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                                </svg>
                            </div>
                            <p class="text-white/60 text-lg">No tasks yet. Start by adding one!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================= SUPABASE CONFIGURATION =================
        // REPLACE THESE WITH YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = 'https://gkaaewdozkcsgftjolhw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_IIfsmYkbBgGZvKpg-QKO-w_naRY9O7t';
        
        // Initialize Supabase - FIXED: Use different variable name
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ================= APP STATE =================
        let currentUser = null;
        let tasks = [];
        let currentCategory = 'work';
        let currentFilter = 'all';
        let subscription = null;

        // ================= AUTH FUNCTIONS =================
        
        async function signIn() {
            console.log('Sign in clicked');
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            const loginText = document.getElementById('login-text');
            const spinner = document.getElementById('login-spinner');
            const errorMsg = document.getElementById('error-message');

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            loginText.classList.add('hidden');
            spinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                // Try to sign in first
                let { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                // If user doesn't exist, create account
                if (error && error.message.includes('Invalid login credentials')) {
                    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password
                    });
                    
                    if (signUpError) throw signUpError;
                    data = signUpData;
                } else if (error) {
                    throw error;
                }

                if (data.user) {
                    currentUser = data.user;
                    showApp();
                    loadTasks();
                    updateDate();
                }
            } catch (error) {
                console.error('Auth error:', error);
                showError(error.message);
                loginText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            if (subscription) subscription.unsubscribe();
            tasks = [];
            showAuth();
        }

        function showError(msg) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = msg;
            errorEl.classList.remove('hidden');
        }

        function showApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
        }

        function showAuth() {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }

        // ================= DATABASE FUNCTIONS =================

        async function loadTasks() {
            if (!currentUser) return;

            // Initial load
            await fetchTasks();

            // Subscribe to real-time changes
            subscription = supabaseClient
                .channel('tasks-channel')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'tasks', filter: `user_id=eq.${currentUser.id}` },
                    (payload) => {
                        fetchTasks();
                    }
                )
                .subscribe();
        }

        async function fetchTasks() {
            const { data, error } = await supabaseClient
                .from('tasks')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching tasks:', error);
                return;
            }

            tasks = data || [];
            renderTasks();
            updateStats();
        }

        async function addTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            
            if (!text) {
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
                return;
            }

            if (!currentUser) return;

            const { error } = await supabaseClient
                .from('tasks')
                .insert([
                    {
                        user_id: currentUser.id,
                        text: text,
                        category: currentCategory,
                        completed: false
                    }
                ]);

            if (error) {
                console.error('Error adding task:', error);
                alert('Failed to add task: ' + error.message);
                return;
            }

            input.value = '';
            createConfetti();
            await fetchTasks();
        }

        async function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            const { error } = await supabaseClient
                .from('tasks')
                .update({ completed: !task.completed })
                .eq('id', id);

            if (error) {
                console.error('Error updating task:', error);
                return;
            }

            if (!task.completed) createConfetti();
            await fetchTasks();
        }

        async function deleteTask(id) {
            const { error } = await supabaseClient
                .from('tasks')
                .delete()
                .eq('id', id);

            if (error) {
                console.error('Error deleting task:', error);
                return;
            }

            await fetchTasks();
        }

        // ================= UI FUNCTIONS =================

        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.cat === cat);
            });
        }

        function getCategoryColor(cat) {
            const colors = {
                work: 'bg-blue-500/20 border-blue-400/30 text-blue-200',
                personal: 'bg-purple-500/20 border-purple-400/30 text-purple-200',
                urgent: 'bg-red-500/20 border-red-400/30 text-red-200'
            };
            return colors[cat] || colors.work;
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
                btn.classList.toggle('bg-white/20', btn.dataset.filter === filter);
                btn.classList.toggle('bg-white/10', btn.dataset.filter !== filter);
            });
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            const emptyState = document.getElementById('empty-state');
            
            let filteredTasks = tasks;
            if (currentFilter === 'active') filteredTasks = tasks.filter(t => !t.completed);
            if (currentFilter === 'completed') filteredTasks = tasks.filter(t => t.completed);

            if (filteredTasks.length === 0) {
                list.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            list.innerHTML = filteredTasks.map(task => `
                <div class="task-item glass rounded-2xl p-4 flex items-center gap-4 group ${task.completed ? 'opacity-60' : ''}">
                    <label class="checkbox-wrapper cursor-pointer relative">
                        <input type="checkbox" class="hidden" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}')">
                        <div class="w-6 h-6 rounded-full border-2 border-white/40 flex items-center justify-center transition-all hover:border-white">
                            <svg class="w-4 h-4 hidden text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                    </label>
                    
                    <div class="flex-1">
                        <p class="${task.completed ? 'line-through text-white/50' : 'text-white'} transition-all">${escapeHtml(task.text)}</p>
                        <span class="inline-block mt-1 px-2 py-1 rounded-md text-xs border ${getCategoryColor(task.category)}">
                            ${task.category.charAt(0).toUpperCase() + task.category.slice(1)}
                        </span>
                    </div>
                    
                    <button onclick="deleteTask('${task.id}')" class="delete-btn p-2 hover:bg-red-500/20 rounded-lg text-red-400 hover:text-red-300 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            const rate = total === 0 ? 0 : Math.round((completed / total) * 100);

            document.getElementById('total-count').textContent = total;
            document.getElementById('pending-count').textContent = pending;
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('completion-rate').textContent = rate + '%';

            const circle = document.getElementById('progress-circle');
            const circumference = 2 * Math.PI * 26;
            const offset = circumference - (rate / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function createConfetti() {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#f0932b', '#eb4d4b', '#6c5ce7', '#00b894'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        // ================= INITIALIZATION =================

        // Check for existing session
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session?.user) {
                currentUser = session.user;
                showApp();
                loadTasks();
                updateDate();
            }
        });

        // Listen for auth changes
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session?.user) {
                currentUser = session.user;
                showApp();
                loadTasks();
                updateDate();
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                showAuth();
            }
        });

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('signin-btn').addEventListener('click', signIn);
            document.getElementById('signout-btn').addEventListener('click', signOut);
            document.getElementById('add-task-btn').addEventListener('click', addTask);
            
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.addEventListener('click', function() {
                    setCategory(this.dataset.cat);
                });
            });
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    filterTasks(this.dataset.filter);
                });
            });
            
            document.getElementById('email-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signIn();
            });
            document.getElementById('password-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signIn();
            });
            document.getElementById('task-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
        });
    </script>
</body>
</html>
