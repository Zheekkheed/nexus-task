<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Cloud Tasks - Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
        }
        .task-item { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .checkbox-wrapper input:checked + div {
            background: #10b981;
            border-color: #10b981;
        }
        .checkbox-wrapper input:checked + div svg { display: block; }
        .delete-btn {
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.3s ease;
        }
        .task-item:hover .delete-btn {
            opacity: 1;
            transform: translateX(0);
        }
        .category-pill.active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .online-badge { background: rgba(34, 197, 94, 0.8); }
    </style>
</head>
<body class="text-white relative">
    <div class="container mx-auto px-4 py-8 max-w-6xl relative z-10">
        
        <!-- AUTH SECTION -->
        <div id="auth-section" class="min-h-screen flex items-center justify-center">
            <div class="glass-card rounded-3xl p-8 w-full max-w-md text-center">
                <div class="mb-6">
                    <div class="w-20 h-20 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full mx-auto flex items-center justify-center mb-4">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold mb-2">Nexus Cloud</h1>
                    <p class="text-white/70">Sync your tasks across all devices</p>
                </div>

                <div class="space-y-4">
                    <input type="email" id="email-input" placeholder="Email address" 
                           class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/50 focus:bg-white/20 transition-all">
                    <input type="password" id="password-input" placeholder="Password (min 6 chars)" 
                           class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/50 focus:bg-white/20 transition-all">
                    
                    <button id="signin-btn" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                        <span id="login-text">Sign In / Create Account</span>
                        <div id="login-spinner" class="loading-spinner hidden"></div>
                    </button>
                    
                    <p class="text-sm text-white/50 mt-4">Enter any email/password to create an account automatically</p>
                    <p id="error-message" class="text-red-400 text-sm hidden mt-2"></p>
                </div>
            </div>
        </div>

        <!-- MAIN APP SECTION -->
        <div id="app-section" class="hidden">
            <header class="flex justify-between items-center mb-12">
                <div class="glass rounded-2xl px-8 py-4 flex items-center gap-4">
                    <div>
                        <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-purple-200">Nexus Cloud</h1>
                        <p class="text-purple-200 text-sm mt-1" id="current-date">Loading...</p>
                    </div>
                    <div id="connection-status" class="online-badge px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-2">
                        <span class="w-2 h-2 bg-white rounded-full"></span>
                        <span>Synced</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button id="signout-btn" class="glass p-4 rounded-2xl hover:bg-white/20 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-6">
                    <div class="glass-card rounded-3xl p-6">
                        <h2 class="text-xl font-semibold mb-4">New Task</h2>
                        <input type="text" id="task-input" placeholder="What needs to be done?" 
                               class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 mb-4 text-white placeholder-white/50 focus:bg-white/20 transition-all">
                        <div class="flex gap-2 mb-4">
                            <button class="category-pill active px-4 py-2 rounded-full text-sm bg-white/10 border border-white/20" data-cat="work">Work</button>
                            <button class="category-pill px-4 py-2 rounded-full text-sm bg-white/10 border border-white/20" data-cat="personal">Personal</button>
                            <button class="category-pill px-4 py-2 rounded-full text-sm bg-white/10 border border-white/20" data-cat="urgent">Urgent</button>
                        </div>
                        <button id="add-task-btn" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold py-3 rounded-xl shadow-lg">
                            Add Task
                        </button>
                    </div>

                    <div class="glass-card rounded-3xl p-6">
                        <h3 class="text-lg font-semibold mb-4">Overview</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-white/70">Total</span>
                                <span class="font-bold text-2xl" id="total-count">0</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-white/70">Pending</span>
                                <span class="font-bold text-2xl text-yellow-400" id="pending-count">0</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-white/70">Completed</span>
                                <span class="font-bold text-2xl text-green-400" id="completed-count">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="glass-card rounded-3xl p-6 min-h-[600px]">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-semibold">Your Tasks</h2>
                            <div class="flex gap-2">
                                <button class="filter-btn active px-4 py-2 rounded-lg text-sm bg-white/20" data-filter="all">All</button>
                                <button class="filter-btn px-4 py-2 rounded-lg text-sm bg-white/10" data-filter="active">Active</button>
                                <button class="filter-btn px-4 py-2 rounded-lg text-sm bg-white/10" data-filter="completed">Completed</button>
                            </div>
                        </div>
                        <div id="task-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2"></div>
                        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
                            <p class="text-white/60 text-lg">No tasks yet. Start by adding one!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================= SUPABASE CONFIGURATION =================
        const SUPABASE_URL = 'https://gkaaewdozkcsgftjolhw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_IIfsmYkbBgGZvKpg-QKO-w_naRY9O7t';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let tasks = [];
        let currentCategory = 'work';
        let currentFilter = 'all';

        // ================= AUTH FUNCTIONS =================
        
        async function signIn() {
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            const loginText = document.getElementById('login-text');
            const spinner = document.getElementById('login-spinner');
            const errorMsg = document.getElementById('error-message');

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            loginText.classList.add('hidden');
            spinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                let { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error && error.message.includes('Invalid login credentials')) {
                    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password
                    });
                    
                    if (signUpError) throw signUpError;
                    data = signUpData;
                } else if (error) {
                    throw error;
                }

                if (data.user) {
                    currentUser = data.user;
                    showApp();
                    loadTasks();
                    updateDate();
                }
            } catch (error) {
                showError(error.message);
                loginText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            showAuth();
        }

        function showError(msg) {
            document.getElementById('error-message').textContent = msg;
            document.getElementById('error-message').classList.remove('hidden');
        }

        function showApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
        }

        function showAuth() {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }

        // ================= DATABASE FUNCTIONS =================

        async function loadTasks() {
            if (!currentUser) return;
            await fetchTasks();
            
            supabaseClient
                .channel('tasks-channel')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'tasks', filter: `user_id=eq.${currentUser.id}` },
                    () => fetchTasks()
                )
                .subscribe();
        }

        async function fetchTasks() {
            const { data, error } = await supabaseClient
                .from('tasks')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching tasks:', error);
                return;
            }

            tasks = data || [];
            renderTasks();
            updateStats();
        }

        async function addTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            
            if (!text) {
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
                return;
            }

            const { error } = await supabaseClient
                .from('tasks')
                .insert([{
                    user_id: currentUser.id,
                    text: text,
                    category: currentCategory,
                    completed: false
                }]);

            if (error) {
                alert('Failed to add task: ' + error.message);
                return;
            }

            input.value = '';
            await fetchTasks();
        }

        // FIXED: Toggle task using created_at as identifier
        async function toggleTask(createdAt) {
            const task = tasks.find(t => t.created_at === createdAt);
            if (!task) return;

            const { error } = await supabaseClient
                .from('tasks')
                .update({ completed: !task.completed })
                .eq('user_id', currentUser.id)
                .eq('created_at', createdAt);

            if (error) {
                console.error('Error updating task:', error);
                alert('Failed to update: ' + error.message);
                return;
            }

            await fetchTasks();
        }

        // FIXED: Delete task using created_at as identifier
        async function deleteTask(createdAt) {
            const { error } = await supabaseClient
                .from('tasks')
                .delete()
                .eq('user_id', currentUser.id)
                .eq('created_at', createdAt);

            if (error) {
                console.error('Error deleting task:', error);
                return;
            }

            await fetchTasks();
        }

        // ================= UI FUNCTIONS =================

        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.cat === cat);
            });
        }

        function getCategoryColor(cat) {
            const colors = {
                work: 'bg-blue-500/20 border-blue-400/30 text-blue-200',
                personal: 'bg-purple-500/20 border-purple-400/30 text-purple-200',
                urgent: 'bg-red-500/20 border-red-400/30 text-red-200'
            };
            return colors[cat] || colors.work;
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
                btn.classList.toggle('bg-white/20', btn.dataset.filter === filter);
                btn.classList.toggle('bg-white/10', btn.dataset.filter !== filter);
            });
            renderTasks();
        }

        // FIXED: Use created_at instead of id
        function renderTasks() {
            const list = document.getElementById('task-list');
            const emptyState = document.getElementById('empty-state');
            
            let filteredTasks = tasks;
            if (currentFilter === 'active') filteredTasks = tasks.filter(t => !t.completed);
            if (currentFilter === 'completed') filteredTasks = tasks.filter(t => t.completed);

            if (filteredTasks.length === 0) {
                list.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            list.innerHTML = filteredTasks.map(task => {
                const taskId = task.created_at; // Use created_at as unique identifier
                return `
                <div class="task-item glass rounded-2xl p-4 flex items-center gap-4 group ${task.completed ? 'opacity-60' : ''}">
                    <label class="checkbox-wrapper cursor-pointer relative">
                        <input type="checkbox" class="hidden" ${task.completed ? 'checked' : ''} onchange="toggleTask('${taskId}')">
                        <div class="w-6 h-6 rounded-full border-2 border-white/40 flex items-center justify-center transition-all hover:border-white">
                            <svg class="w-4 h-4 hidden text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                    </label>
                    
                    <div class="flex-1">
                        <p class="${task.completed ? 'line-through text-white/50' : 'text-white'} transition-all">${escapeHtml(task.text)}</p>
                        <span class="inline-block mt-1 px-2 py-1 rounded-md text-xs border ${getCategoryColor(task.category)}">
                            ${task.category.charAt(0).toUpperCase() + task.category.slice(1)}
                        </span>
                    </div>
                    
                    <button onclick="deleteTask('${taskId}')" class="delete-btn p-2 hover:bg-red-500/20 rounded-lg text-red-400 hover:text-red-300 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                    </button>
                </div>
            `}).join('');
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('total-count').textContent = total;
            document.getElementById('pending-count').textContent = pending;
            document.getElementById('completed-count').textContent = completed;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ================= INITIALIZATION =================

        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session?.user) {
                currentUser = session.user;
                showApp();
                loadTasks();
                updateDate();
            }
        });

        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session?.user) {
                currentUser = session.user;
                showApp();
                loadTasks();
                updateDate();
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                showAuth();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('signin-btn').addEventListener('click', signIn);
            document.getElementById('signout-btn').addEventListener('click', signOut);
            document.getElementById('add-task-btn').addEventListener('click', addTask);
            
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.addEventListener('click', function() {
                    setCategory(this.dataset.cat);
                });
            });
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    filterTasks(this.dataset.filter);
                });
            });
            
            document.getElementById('email-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signIn();
            });
            document.getElementById('password-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signIn();
            });
            document.getElementById('task-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
        });
    </script>
</body>
</html>
